<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>職種詳細（準備中） — 採用LP 合作版 v7 — Enjin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:wght@400;600;700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --red:#BF0F0F; --ink:#1a1a1a; --paper:#FFF7F8; }
    html, body { font-family:'Noto Sans JP', sans-serif; background:#fff; color:var(--ink); min-height:100vh; }
    .font-alumni { font-family:'Alumni Sans', sans-serif; }
    .text-red { color:var(--red); } .bg-red { background:var(--red); } .bg-paper { background:var(--paper); }
    .eyebrow { font-family:'Alumni Sans', sans-serif; font-weight:700; letter-spacing:0.12em; font-size:0.8rem; color:var(--red); text-transform:uppercase; }
    .sec-title { font-weight:900; letter-spacing:0.02em; }
    .sec-en-ghost { position:absolute; pointer-events:none; user-select:none; z-index:0; font-family:'Alumni Sans',sans-serif; font-weight:900; color:rgba(191,15,15,0.05); font-size:16vw; line-height:0.8; white-space:nowrap; }
    @keyframes lineUp { from{opacity:0;transform:translateY(26px);} to{opacity:1;transform:translateY(0);} }
    .stagger > * { opacity:0; animation:lineUp 0.9s cubic-bezier(.22,1,.36,1) forwards; }
    .stagger > *:nth-child(1){animation-delay:.1s;} .stagger > *:nth-child(2){animation-delay:.28s;}
    .stagger > *:nth-child(3){animation-delay:.46s;} .stagger > *:nth-child(4){animation-delay:.64s;}
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="px-6 lg:px-10 py-4 flex items-center justify-between bg-white/95 backdrop-blur sticky top-0 z-50 border-b border-gray-100">
    <a href="top-v7.html"><img src="images/logo_enjin.png" alt="Enjin" style="height:26px;width:auto;" /></a>
    <nav class="hidden lg:flex items-center gap-5 text-[13px] font-medium">
      <a href="about-v7.html" class="hover:text-red transition">会社を知る</a>
      <a href="recruitment-v7.html" class="text-red font-bold">採用情報</a>
      <a href="environment-v7.html" class="hover:text-red transition">働く環境</a>
      <a href="members-v7.html" class="hover:text-red transition">ひとを知る</a>
      <a href="top-v7.html#cta" class="bg-red text-white px-4 py-2 text-xs font-bold tracking-wider hover:opacity-90 transition">説明会に申し込む</a>
    </nav>
  </header>

  <div class="pt-10 px-6 lg:px-16 text-[11px] text-gray-400 max-w-5xl mx-auto w-full relative z-10">
    <a href="top-v7.html" class="hover:text-red">TOP</a><span class="mx-2">›</span><a href="recruitment-v7.html" class="hover:text-red">職種紹介</a><span class="mx-2">›</span><span id="bcRole" class="text-gray-700">職種</span>
  </div>

  <main class="flex-1 flex flex-col items-center justify-center text-center px-6 py-24 relative overflow-hidden">
    <div class="sec-en-ghost" style="top:30%;left:50%;transform:translate(-50%,-50%);">COMING SOON</div>
    <div class="stagger relative z-10">
      <p id="role" class="eyebrow mb-4">職種</p>
      <h1 class="sec-title text-5xl lg:text-7xl mb-8">準備中。</h1>
      <p class="text-sm text-gray-600 leading-loose max-w-md mx-auto mb-10">この職種の詳細ページは現在制作中です。<br />説明会では詳しくご紹介できますので、お気軽にご参加ください。</p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="top-v7.html#cta" class="bg-red text-white px-8 py-3.5 text-sm font-bold tracking-wider hover:opacity-90 transition">説明会で話を聞く　→</a>
        <a href="recruitment-v7.html" class="border border-gray-300 text-gray-700 px-8 py-3.5 text-sm hover:border-red hover:text-red transition">他の職種を見る</a>
      </div>
    </div>
  </main>

  <footer class="bg-paper px-6 lg:px-16 py-8 border-t border-gray-200">
    <div class="max-w-5xl mx-auto text-[11px] text-gray-400 flex flex-col lg:flex-row items-center justify-between gap-2">
      <p>© Enjin Inc. All Rights Reserved.</p>
      <p class="text-[10px]">RECRUIT LP 合作版 v7 ／ 職種詳細（準備中）</p>
    </div>
  </footer>

  <script>
    var map = { planner:'企画 ／ プランナー', hr:'HR', accounting:'経理' };
    var r = new URLSearchParams(location.search).get('role');
    if (r && map[r]) {
      document.getElementById('role').textContent = map[r];
      document.getElementById('bcRole').textContent = map[r];
      document.title = map[r] + ' — 準備中 — Enjin';
    }
  </script>
</body>
</html>
