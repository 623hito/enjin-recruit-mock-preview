<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>準備中 — 採用LP（v3） — Enjin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@500;700;900&family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    html { scroll-behavior: smooth; }
    html, body { font-family: 'Noto Sans JP', sans-serif; background:#0a0a0a; color:#fff; min-height:100vh; }
    .font-mincho { font-family: 'Noto Serif JP', serif; }
    .font-outfit { font-family: 'Outfit', sans-serif; }
    .text-enjin-red { color:#e8233f; }
    .bg-enjin-red { background-color:#e8233f; }
    .enjin-logo { font-family:'Outfit',sans-serif; font-weight:500; font-size:22px; letter-spacing:-0.04em; color:#fff; }
    .enjin-logo .e { color:#e8233f; font-weight:600; }
    .aurora {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(circle at 30% 30%, rgba(232,35,63,0.25) 0%, transparent 45%),
        radial-gradient(circle at 70% 70%, rgba(120,40,200,0.18) 0%, transparent 45%);
      filter: blur(40px);
      opacity: 0; transition: opacity 1.5s ease;
      animation: aurora-drift 24s ease-in-out infinite alternate;
    }
    body.aurora-on .aurora { opacity: 1; }
    @keyframes aurora-drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(4%,-4%) scale(1.15); }
    }
    .ticker-row { position: relative; overflow: hidden; pointer-events: none; user-select: none; }
    .ticker-jp {
      display: inline-block; white-space: nowrap;
      font-family: 'Noto Serif JP', serif; font-weight: 900;
      font-size: 14vw; line-height: 0.9; color: transparent;
      -webkit-text-stroke: 1px rgba(232,35,63,0.18);
      animation: ticker-scroll 50s linear infinite;
      animation-play-state: paused;
    }
    body.motion-on .ticker-jp { animation-play-state: running; }
    @keyframes ticker-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .pill-nav {
      background: rgba(255,255,255,0.96); color:#0a0a0a;
      border-radius: 999px; padding: 0.55rem 0.55rem 0.55rem 1.4rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 6px 30px rgba(0,0,0,0.25);
    }
    .pill-nav a { color:#0a0a0a; }
    .pill-nav a:hover { color:#e8233f; }
    .pill-cta { background:#0a0a0a; color:#fff; border-radius: 999px; padding: 0.55rem 1.2rem; font-weight:700; font-size:12px; letter-spacing:0.1em; }
    .pill-cta:hover { background:#e8233f; }
    @keyframes lineUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    .stagger > * { opacity:0; animation: lineUp 1s cubic-bezier(.22,1,.36,1) forwards; animation-play-state: paused; }
    body.motion-on .stagger > * { animation-play-state: running; }
    .stagger > *:nth-child(1) { animation-delay: 0.20s; }
    .stagger > *:nth-child(2) { animation-delay: 0.40s; }
    .stagger > *:nth-child(3) { animation-delay: 0.60s; }
    .stagger > *:nth-child(4) { animation-delay: 0.80s; }
    .ghost-en {
      position: absolute; pointer-events: none; user-select: none;
      font-family: 'Outfit', sans-serif; font-weight: 900;
      color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.05);
      font-size: 22vw; line-height: 0.9; z-index: 0;
    }
  </style>
</head>
<body class="flex flex-col">

  <div class="aurora"></div>

  <header class="fixed top-4 left-0 right-0 z-50 px-4 lg:px-8 flex justify-center">
    <div class="pill-nav flex items-center gap-5">
      <a href="top-v3.html" class="enjin-logo whitespace-nowrap"><span class="e">E</span>njin</a>
      <nav class="hidden lg:flex items-center gap-5 text-[12px] font-medium">
        <a href="top-v3.html#about">企業情報</a>
        <a href="top-v3.html#qa">社長に聞いてみた</a>
        <a href="top-v3.html#jobs">職種紹介</a>
        <a href="top-v3.html#members">働くひとたち</a>
        <a href="top-v3.html#benefits">福利厚生</a>
      </nav>
      <a href="top-v3.html#entry" class="pill-cta">ENTRY　→</a>
    </div>
  </header>

  <div class="pt-32 px-6 lg:px-16 text-[11px] text-white/50 max-w-[1600px] mx-auto relative z-10">
    <a href="top-v3.html" class="hover:text-enjin-red">TOP</a>
    <span class="mx-2">›</span>
    <a href="top-v3.html#jobs" class="hover:text-enjin-red">職種紹介</a>
    <span class="mx-2">›</span>
    <span id="bcRole" class="text-white font-medium">職種</span>
  </div>

  <main class="flex-1 flex flex-col items-center justify-center text-center px-6 py-24 relative z-10">
    <div class="ghost-en" style="top:35%; left:50%; transform:translate(-50%,-50%);">SOON</div>
    <div class="stagger relative z-10">
      <p id="role" class="text-enjin-red text-sm font-bold mb-6 tracking-[0.3em]">職種</p>
      <h1 class="font-mincho font-bold text-5xl lg:text-8xl mb-8 leading-tight">準備中。</h1>
      <p class="text-sm text-white/70 leading-loose max-w-md mx-auto mb-12">
        この職種の詳細ページは現在準備中です。<br/>もうしばらくお待ちください。
      </p>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <a href="top-v3.html" class="bg-enjin-red text-white px-8 py-3 text-sm font-bold tracking-wider hover:bg-red-700 transition">← TOPに戻る</a>
        <a href="top-v3.html#jobs" class="border border-white/40 text-white px-8 py-3 text-sm tracking-wider hover:border-enjin-red hover:text-enjin-red transition">他の職種を見る</a>
      </div>
    </div>
  </main>

  <div class="ticker-row py-8 relative z-10">
    <span class="ticker-jp">求む、未完成の人格者。 ／ 求む、未完成の人格者。 ／ 求む、未完成の人格者。 ／ </span>
  </div>

  <footer class="px-6 lg:px-16 py-8 border-t border-white/10 relative z-10">
    <div class="max-w-6xl mx-auto text-[11px] text-white/40 flex flex-col lg:flex-row items-center justify-between gap-2">
      <p>© Enjin Inc. All Rights Reserved.</p>
      <p class="text-[10px]">RECRUIT LP MOCK v3 ／ 準備中ページ</p>
    </div>
  </footer>

  <script>
    var map = { planner: '企画 ／ プランナー', hr: 'HR', accounting: '経理' };
    var r = new URLSearchParams(location.search).get('role');
    if (r && map[r]) {
      document.getElementById('role').textContent = map[r];
      document.getElementById('bcRole').textContent = map[r];
      document.title = map[r] + ' — 準備中 — Enjin';
    }
    (function(){
      function startMotion() {
        document.body.classList.add('motion-on');
        document.body.classList.add('aurora-on');
        document.querySelectorAll('.stagger > *').forEach(function(el){
          el.style.animation = 'none'; void el.offsetWidth; el.style.animation = '';
        });
      }
      function init() {
        var gate = document.getElementById('rlpt_gate');
        if (!gate) { startMotion(); return; }
        var mo = new MutationObserver(function(){
          if (!document.getElementById('rlpt_gate')) { mo.disconnect(); setTimeout(startMotion, 50); }
        });
        mo.observe(document.body, { childList: true, subtree: false });
      }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); }
      else { init(); }
    })();
  </script>
</body>
</html>
